name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare sample data
        run: |
          python - << 'PY'
          import pandas as pd
          import numpy as np
          rng = pd.date_range('2024-01-01', periods=24*60, freq='h')
          rs = np.random.RandomState(42)
          base = 120 + 40*np.sin(2*np.pi*rng.hour/24) + 20*(rng.dayofweek>=5) + rs.normal(0, 12, len(rng))
          df = pd.DataFrame({
              'pickup_datetime': rng.astype(str),
              'trip_count': np.clip(base, 1, None).round().astype(int)
          })
          df.to_csv('data/train.csv', index=False)
          PY

      - name: Run training scripts
        run: |
          python src/train_baseline.py
          python src/train_with_cv.py

      - name: Validate outputs
        run: |
          test -f reports/model_comparison.csv
          test -f reports/cv_metrics.csv
          test -f models/best_model.pkl

      - name: API smoke check
        run: |
          python -c "from src.predict_api import app; print(app.title)"

      - name: Run tests
        run: |
          pytest -q
